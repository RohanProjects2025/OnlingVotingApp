<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>User Dashboard</title>

	<link rel="stylesheet" href="css/style.css">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	
	<style>

	        /* Main Dashboard Content */
	        .dashboard-container {
	            max-width: 1200px;
	            margin: 40px auto;
	            padding: 0 20px;
	            text-align: center;
	        }

	        .dashboard-header h1 {
	            font-size: 24px;
	            color: #222;
	            margin-bottom: 5px;
	        }

	        .dashboard-header p {
	            font-size: 14px;
	            color: #777;
	            margin-bottom: 40px;
	        }

	        /* Grid Layout for Candidate Cards */
	        .cards-grid {
	            display: grid;
	            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
	            gap: 25px;
	        }

	        /* Card Styling */
	        .card {
	            background: #ffffff;
	            border-radius: 12px;
	            padding: 30px 20px;
	            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
	            text-align: center;
	            transition: transform 0.3s ease, box-shadow 0.3s ease;
	        }

	        .card:hover {
	            transform: translateY(-5px);
	            box-shadow: 0 6px 20px rgba(98, 0, 234, 0.08);
	        }

	        /* Avatar Icons with specific UI colors */
	        .avatar-container {
	            width: 50px;
	            height: 50px;
	            border-radius: 50%;
	            display: flex;
	            align-items: center;
	            justify-content: center;
	            margin: 0 auto 15px auto;
	        }

	        /* Assigning colors based on UI image */
	        .card:nth-child(1) .avatar-container { background-color: rgb(61, 78, 173); color: white; }
	        .card:nth-child(2) .avatar-container { background-color: #4CAF50; color: white; }
	        .card:nth-child(3) .avatar-container { background-color: #FF9800; color: white; }
	        .card:nth-child(4) .avatar-container { background-color: rgb(3, 156, 222); color: white; }

	        .avatar-container svg {
	            width: 24px;
	            height: 24px;
	            fill: currentColor;
	        }

	        .candidate-name {
	            font-size: 13px;
	            color: #666;
	            font-weight: 500;
	            margin-bottom: 15px;
	        }

	        .vote-count {
	            font-size: 36px;
	            font-weight: 700;
	            color: #222;
	            margin-bottom: 2px;
	        }

	        .vote-label {
	            font-size: 12px;
	            color: #999;
	            text-transform: capitalize;
	        }
	    </style>
</head>

<body>

	<header>

		<nav class="navbar">

			<a href="index.html" class="logo">
				<i class="fa-solid fa-vote-yea"></i>
				<span>VOTE</span>
			</a>

			<ul class="nav-links">
				<li><a href="#">Home</a></li>
				<li><a href="#" class="active">Welcome admin</a></li>
				<li><a th:href="@{/logout}" style="color:red">Logout</a></li>
			</ul>

		</nav>

	</header>
	
	<section class="dashboard-container">
	        <div class="dashboard-header">
	            <h1>Admin Dashboard</h1>
	            <p>Overview of all candidates and their total votes.</p>
	        </div>

	        <div class="cards-grid">
	            <div class="card">
	                <div class="avatar-container">
	                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
	                </div>
	                <div class="candidate-name">Candidate 1</div>
	                <div class="vote-count" th:text="${c1}"></div>
	                <div class="vote-label">Total Votes</div>
	            </div>

	            <div class="card">
	                <div class="avatar-container">
	                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
	                </div>
	                <div class="candidate-name">Candidate 2</div>
	                <div class="vote-count" th:text="${c2}"></div>
	                <div class="vote-label">Total Votes</div>
	            </div>

	            <div class="card">
	                <div class="avatar-container">
	                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
	                </div>
	                <div class="candidate-name">Candidate 3</div>
	                <div class="vote-count" th:text="${c3}"></div>
	                <div class="vote-label">Total Votes</div>
	            </div>

	            <div class="card">
	                <div class="avatar-container">
	                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
	                </div>
	                <div class="candidate-name">Candidate 4</div>
	                <div class="vote-count" th:text="${c4}"></div>
	                <div class="vote-label">Total Votes</div>
	            </div>
	        </div>
	    </section>


	

</body>

</html>
