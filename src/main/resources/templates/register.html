<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register | Voting System</title>

	<link rel="stylesheet" href="css/style.css">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

	<header>

		<nav class="navbar">

			<!--<a href="#" class="logo">
					<i class="fa-solid fa-vote-yea"></i>
					<span>VOTE</span>
				</a>-->
			<a class="logo"> <img src="images/vote1.png" style="height: 34px;">
				</img></a>

			<ul class="nav-links">
				<li><a th:href="@{/}" class="active">Home</a></li>
				<li><a th:href="@{/register}">Register</a></li>
				<li><a th:href="@{/login}">Login</a></li>
				<li><a href="#">About</a></li>
			</ul>

			<button class="theme-btn" id="themeBtn">
				<i class="fa-solid fa-moon"></i>
			</button>

		</nav>

	</header>

	<section class="register-section">

		<div class="register-container">

			<!-- Left Side -->

			<div class="register-left">

				<h1>Create <br> Your Account</h1>

				<p>
					Join us and be a part of
					the democratic process.
				</p>

				<div class="register-illustration">
					<i class="fa-solid fa-clipboard-check"></i>
				</div>

			</div>

			<!-- Right Side -->

			<div class="register-card">

				<div th:if="${session.fail}">
					<h3 th:text="${session.fail}" style="color:red"></h3>
				</div>

				<div th:if="${session.success}">
					<h3 th:text="${session.success}" style="color:green"></h3>
				</div>

				<form th:action="@{/createuser}" method="post">

					<div class="form-group">

						<label>
							<i class="fa-regular fa-user"></i>
							User Name
						</label>

						<input type="text" placeholder="Enter your name" name="name" required>

					</div>

					<div class="form-group">

						<label>
							<i class="fa-regular fa-envelope"></i>
							Email Id
						</label>

						<input type="email" placeholder="Enter your email" name="email" required>

					</div>

					<div class="form-group">

						<label>
							<i class="fa-solid fa-phone"></i>
							Phone No
						</label>

						<input type="tel" placeholder="Enter your phone number" name="phoneno" required>

					</div>

					<div class="form-group">

						<label>
							<i class="fa-solid fa-lock"></i>
							Password
						</label>

						<div class="password-box">

							<input type="password" id="registerPassword" placeholder="Enter your password"
								name="password" required>

							<i class="fa-solid fa-eye" onclick="toggleRegisterPassword()"></i>

						</div>

					</div>

					<input type="submit" value="Register" class="register-btn">
					<!--<button class="register-btn">
                        Register
                    </button> -->

				</form>

			</div>

		</div>

	</section>

	<script src="js/script.js"></script>

</body>

</html>
